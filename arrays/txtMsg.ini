[Globals]
Intro="This is University Hospital Coventry."
Signature="If you have any queries, please call on 02476966393 or 02476966340."
[Dropdowns]
Hospital="University Hospital Coventry, Rugby St Cross Hospital"
Location="Clinic 6 in the Outpatient Department, Day Surgery Unit"
Appointment="Face-to-Face Pre-Op, Telephone Pre-Op, Face-to-Face Ophthalmology Pre-Op, Telephone Ophthalmology Pre-Op, Pre-Op Prep, Stage 2 Pre-Op, Face-to-Face Consultant Anaesthetist, "

[Appointment Booked]
Variables="PhoneNum, Appointment, Hospital, Location, Date, Time"
To="{PhoneNum}@sms.mmg.co.uk"
Subject="F2F Pre-Op Appointment Booked"
Body="{Intro} This is confirmation that you have a {Appointment} appointment booked on {Date} @ {Time}. Please come to {Location} at the {Hospital}. {Signature}"

[Appointment Rescheduled]
Variables="PhoneNum, Appointment, Hospital, Location, Date, Time"
To="{PhoneNum}@sms.mmg.co.uk"
Subject="F2F Pre-Op Appointment Rescheduled"
Body="{Intro} This is confirmation that your {Appointment} with our pre-operative nurse has been RE-SCHEDULED to {Date} @ {Time}. Please come to {Location} at the {Hospital}. {Signature}"

[Appointment Cancellation]
Variables="PhoneNum, Appointment, Hospital, Location, Date, Time"
To="{PhoneNum}@sms.mmg.co.uk"
Subject="F2F Pre-Op Appointment Cancellation"
Body="{Intro} This is a message about your {Appointment} appointment. We regret to inform you your appointment in {Location} at {Hospital} on {Date} @ {Time} has been cancelled. Sorry for any inconvenience caused. If this was unplanned you should be contacted shortly to rebook. {Signature}

